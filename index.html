<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartDesk — AI Assistant Demo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --text: #f0ede8;
    --muted: #6b6b6b;
    --accent: #c8f060;
    --accent-dim: rgba(200,240,96,0.12);
    --user-bubble: #1f2f0f;
    --bot-bubble: #1e1e1e;
  }
 
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
 
  .wrapper {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }
 
  /* Header */
  .header {
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 16px 16px 0 0;
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
 
  .avatar {
    width: 40px;
    height: 40px;
    background: var(--accent);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
 
  .header-info {}
  .header-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.2px;
  }
  .header-status {
    font-size: 12px;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 1px;
  }
  .status-dot {
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
 
  .powered-badge {
    margin-left: auto;
    font-size: 10px;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 8px;
    letter-spacing: 0.3px;
  }
  .powered-badge span { color: var(--accent); }
 
  /* Messages */
  .messages {
    background: var(--bg);
    border: 1px solid var(--border);
    border-top: none;
    border-bottom: none;
    height: 420px;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
 
  .msg {
    display: flex;
    flex-direction: column;
    max-width: 85%;
    animation: fadeUp 0.25s ease forwards;
    opacity: 0;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
 
  .msg.bot { align-self: flex-start; }
  .msg.user { align-self: flex-end; }
 
  .bubble {
    padding: 11px 14px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.55;
    font-weight: 400;
  }
 
  .bot .bubble {
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    border-radius: 4px 14px 14px 14px;
    color: var(--text);
  }
  .user .bubble {
    background: var(--user-bubble);
    border: 1px solid rgba(200,240,96,0.2);
    border-radius: 14px 14px 4px 14px;
    color: var(--accent);
  }
 
  .msg-time {
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
    padding: 0 4px;
  }
  .bot .msg-time { align-self: flex-start; }
  .user .msg-time { align-self: flex-end; }
 
  /* Typing indicator */
  .typing-indicator {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 13px 14px;
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    border-radius: 4px 14px 14px 14px;
    width: fit-content;
    animation: fadeUp 0.25s ease forwards;
    opacity: 0;
  }
  .typing-indicator span {
    width: 6px;
    height: 6px;
    background: var(--muted);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }
 
  /* Quick replies */
  .quick-replies {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 0 0 4px 0;
  }
  .qr-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 6px 12px;
    background: var(--accent-dim);
    border: 1px solid rgba(200,240,96,0.25);
    color: var(--accent);
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .qr-btn:hover {
    background: rgba(200,240,96,0.22);
    border-color: rgba(200,240,96,0.5);
    transform: translateY(-1px);
  }
 
  /* Input */
  .input-area {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 1px solid var(--border);
    border-radius: 0 0 16px 16px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
 
  .input-field {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
    resize: none;
    height: 42px;
    line-height: 22px;
  }
  .input-field::placeholder { color: var(--muted); }
  .input-field:focus { border-color: rgba(200,240,96,0.4); }
 
  .send-btn {
    width: 42px;
    height: 42px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .send-btn:hover { background: #d4f570; transform: scale(1.04); }
  .send-btn:active { transform: scale(0.97); }
  .send-btn svg { width: 18px; height: 18px; color: #0f0f0f; }
 
  /* Promo strip */
  .promo {
    margin-top: 14px;
    text-align: center;
    font-size: 12px;
    color: var(--muted);
  }
  .promo a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 500;
  }
  .promo a:hover { text-decoration: underline; }
 
  .divider {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 0;
  }
  .divider-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .divider-text {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
 
  /* Lead capture */
  .lead-card {
    background: var(--surface);
    border: 1px solid rgba(200,240,96,0.25);
    border-radius: 12px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    animation: fadeUp 0.3s ease forwards;
    opacity: 0;
  }
  .lead-card p { font-size: 13px; color: var(--text); font-weight: 500; }
  .lead-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text);
    outline: none;
    width: 100%;
    transition: border-color 0.15s;
  }
  .lead-input:focus { border-color: rgba(200,240,96,0.4); }
  .lead-input::placeholder { color: var(--muted); }
  .lead-submit {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 9px;
    background: var(--accent);
    color: #0f0f0f;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    width: 100%;
  }
  .lead-submit:hover { background: #d4f570; }
</style>
</head>
<body>
 
<div class="wrapper">
  <div class="header">
    <div class="avatar">✦</div>
    <div class="header-info">
      <div class="header-name">AI Assistant</div>
      <div class="header-status"><span class="status-dot"></span> Online now</div>
    </div>
    <div class="powered-badge">Powered by <span>AI</span></div>
  </div>
 
  <div class="messages" id="messages"></div>
 
  <div class="input-area">
    <input class="input-field" id="userInput" type="text" placeholder="Ask me anything…" autocomplete="off" />
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>
 
<div class="promo">
  Want this chatbot on your website? <a href="mailto:your@email.com" id="ctaLink">Let's talk →</a>
</div>
 
<script>
const SYSTEM_PROMPT = `You are a helpful, friendly AI assistant for a local business. You help customers with:
- Questions about services and pricing
- Booking or scheduling inquiries
- Hours, location, and contact info
- General FAQs
 
Keep responses SHORT — 1-3 sentences max. Be warm, professional, and conversational. 
If someone wants to book or needs direct help, offer to collect their name and phone number.
If you don't know a specific detail (like exact hours or address), say the business will follow up.
Never make up specific prices. You're a demo — keep it flexible for any business type.`;
 
const QUICK_REPLIES = [
  "What services do you offer?",
  "How do I book an appointment?",
  "What are your hours?",
  "Do you offer free consultations?"
];
 
let conversationHistory = [];
let leadCaptured = false;
 
function getTime() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}
 
function appendMessage(text, role, extras = {}) {
  const container = document.getElementById('messages');
 
  const msg = document.createElement('div');
  msg.className = `msg ${role}`;
 
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
 
  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = getTime();
 
  msg.appendChild(bubble);
  msg.appendChild(time);
 
  if (extras.quickReplies) {
    const qrDiv = document.createElement('div');
    qrDiv.className = 'quick-replies';
    extras.quickReplies.forEach(qr => {
      const btn = document.createElement('button');
      btn.className = 'qr-btn';
      btn.textContent = qr;
      btn.onclick = () => {
        qrDiv.remove();
        sendMessage(qr);
      };
      qrDiv.appendChild(btn);
    });
    msg.appendChild(qrDiv);
  }
 
  container.appendChild(msg);
  container.scrollTop = container.scrollHeight;
  return msg;
}
 
function showTyping() {
  const container = document.getElementById('messages');
  const indicator = document.createElement('div');
  indicator.className = 'typing-indicator';
  indicator.id = 'typing';
  indicator.innerHTML = '<span></span><span></span><span></span>';
  container.appendChild(indicator);
  container.scrollTop = container.scrollHeight;
}
 
function hideTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}
 
function showLeadCapture() {
  if (leadCaptured) return;
  const container = document.getElementById('messages');
 
  const card = document.createElement('div');
  card.className = 'lead-card';
  card.innerHTML = `
    <p>📋 Leave your info and we'll follow up shortly:</p>
    <input class="lead-input" id="leadName" placeholder="Your name" />
    <input class="lead-input" id="leadPhone" placeholder="Phone number" />
    <button class="lead-submit" onclick="submitLead()">Send My Info →</button>
  `;
 
  const wrapper = document.createElement('div');
  wrapper.className = 'msg bot';
  wrapper.appendChild(card);
  container.appendChild(wrapper);
  container.scrollTop = container.scrollHeight;
}
 
function submitLead() {
  const name = document.getElementById('leadName').value.trim();
  const phone = document.getElementById('leadPhone').value.trim();
  if (!name || !phone) { alert('Please fill in both fields.'); return; }
  leadCaptured = true;
  // In production, you'd POST this to your backend / CRM
  appendMessage(`Got it, ${name}! The team will reach out to ${phone} soon. Talk soon! 👋`, 'bot');
  document.querySelectorAll('.lead-card').forEach(c => c.closest('.msg').remove());
}
 
async function sendMessage(overrideText) {
  const input = document.getElementById('userInput');
  const text = overrideText || input.value.trim();
  if (!text) return;
 
  input.value = '';
  appendMessage(text, 'user');
  conversationHistory.push({ role: 'user', content: text });
 
  showTyping();
 
  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json'
               'x-api-key': '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',
               'anthropic-version': '2023-06-01','anthropic-dangrous-direct-browser-access': 'True'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });
 
    const data = await response.json();
    const reply = data.content?.[0]?.text || "Sorry, I'm having trouble right now. Please try again!";
 
    hideTyping();
    conversationHistory.push({ role: 'assistant', content: reply });
 
    const wantsBooking = /book|appoint|schedule|contact|call me|reach out/i.test(reply + text);
    appendMessage(reply, 'bot');
 
    if (wantsBooking && !leadCaptured) {
      setTimeout(showLeadCapture, 600);
    }
 
  } catch (err) {
    hideTyping();
    appendMessage("Hmm, something went wrong on my end. Try again in a moment!", 'bot');
  }
}
 
document.getElementById('userInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
 
// Welcome message on load
window.addEventListener('load', () => {
  setTimeout(() => {
    appendMessage(
      "Hey there! 👋 I'm the AI assistant for this business. Ask me about services, hours, or how to get started.",
      'bot',
      { quickReplies: QUICK_REPLIES }
    );
  }, 400);
});
</script>
</body>
</html>
